services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cicd_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cicd_db
      DB_USER: app
      DB_PASS: app
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
